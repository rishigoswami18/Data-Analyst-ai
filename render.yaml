databases:
  - name: ai-data-analyst-db
    plan: free
    databaseName: ai_data_analyst
    user: ai_data_analyst_user

services:
  - type: web
    name: ai-data-analyst-chatbot
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: ai-data-analyst-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
